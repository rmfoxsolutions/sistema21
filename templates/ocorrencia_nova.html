{% extends 'base.html' %}
{% block title %}Nova Ocorrência - PMESP{% endblock %}

{% block content %}
<div class="container-fluid px-3 pb-5">

  <div class="form-page-header mb-4">
    <a href="{{ url_for('menu') }}" class="btn-voltar">
      <i class="bi bi-arrow-left me-1"></i>Voltar
    </a>
    <div class="form-page-icon icon-vermelho mx-auto">
      <i class="bi bi-file-earmark-text-fill"></i>
    </div>
    <h2 class="form-page-titulo">Nova Ocorrência</h2>
    <p class="form-page-sub">Registre o atendimento / boletim</p>
  </div>

  <form method="POST" novalidate>

    <!-- Tipo e Natureza -->
    <div class="form-card mb-3">
      <div class="form-card-titulo">
        <i class="bi bi-tag-fill me-2 text-danger"></i>Classificação
      </div>

      <div class="mb-3">
        <label class="pmesp-label" for="tipo">Tipo <span class="text-danger">*</span></label>
        <select id="tipo" name="tipo" class="form-select pmesp-select" required>
          <option value="" disabled selected>Selecione o tipo</option>
          <option value="Roubo">Roubo</option>
          <option value="Furto">Furto</option>
          <option value="Tráfico">Tráfico de Drogas</option>
          <option value="Homicídio">Homicídio</option>
          <option value="Lesão Corporal">Lesão Corporal</option>
          <option value="Acidente de Trânsito">Acidente de Trânsito</option>
          <option value="Perturbação">Perturbação do Sossego</option>
          <option value="Violência Doméstica">Violência Doméstica</option>
          <option value="Flagrante">Flagrante Delito</option>
          <option value="Outros">Outros</option>
        </select>
      </div>

      <div class="mb-0">
        <label class="pmesp-label" for="natureza">Natureza / Complemento</label>
        <input type="text" id="natureza" name="natureza" class="form-control pmesp-input-field"
               placeholder="Ex: Roubo a transeunte, porte ilegal..." maxlength="100" />
      </div>
    </div>

    <!-- Local -->
    <div class="form-card mb-3">
      <div class="form-card-titulo">
        <i class="bi bi-geo-alt-fill me-2 text-danger"></i>Localização
      </div>

      <div class="mb-3">
        <label class="pmesp-label" for="local_fato">Endereço / Local <span class="text-danger">*</span></label>
        <input type="text" id="local_fato" name="local_fato" class="form-control pmesp-input-field"
               placeholder="Rua, Av., número..." maxlength="200" required />
      </div>

      <div class="mb-0">
        <label class="pmesp-label" for="bairro">Bairro</label>
        <input type="text" id="bairro" name="bairro" class="form-control pmesp-input-field"
               placeholder="Nome do bairro" maxlength="100" />
      </div>
    </div>

    <!-- Prioridade -->
    <div class="form-card mb-3">
      <div class="form-card-titulo">
        <i class="bi bi-exclamation-triangle-fill me-2 text-danger"></i>Prioridade
      </div>
      <div class="d-flex gap-2">
        <label class="pmesp-radio-card flex-fill">
          <input type="radio" name="prioridade" value="alta" />
          <div class="radio-content radio-alta">
            <i class="bi bi-chevron-double-up"></i>
            <span>Alta</span>
          </div>
        </label>
        <label class="pmesp-radio-card flex-fill">
          <input type="radio" name="prioridade" value="normal" checked />
          <div class="radio-content radio-normal">
            <i class="bi bi-dash"></i>
            <span>Normal</span>
          </div>
        </label>
        <label class="pmesp-radio-card flex-fill">
          <input type="radio" name="prioridade" value="baixa" />
          <div class="radio-content radio-baixa">
            <i class="bi bi-chevron-double-down"></i>
            <span>Baixa</span>
          </div>
        </label>
      </div>
    </div>

    <!-- Descrição -->
    <div class="form-card mb-4">
      <div class="form-card-titulo">
        <i class="bi bi-card-text me-2 text-danger"></i>Descrição
      </div>
      <textarea id="descricao" name="descricao" class="form-control pmesp-textarea"
                placeholder="Descreva detalhes da ocorrência..." rows="4" maxlength="1000"></textarea>
      <small class="text-muted d-block text-end mt-1" id="charCount">0/1000</small>
    </div>

    <button type="submit" class="btn btn-submit w-100 py-3 fw-bold fs-5 mb-3">
      <i class="bi bi-send-fill me-2"></i>REGISTRAR OCORRÊNCIA
    </button>

    <a href="{{ url_for('menu') }}" class="btn btn-outline-secondary w-100 py-2">
      <i class="bi bi-x me-1"></i>Cancelar
    </a>

  </form>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  const textarea = document.getElementById('descricao');
  const counter = document.getElementById('charCount');
  textarea.addEventListener('input', () => {
    counter.textContent = `${textarea.value.length}/1000`;
  });
</script>
{% endblock %}
