<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0d1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>PMESP — 21º BPM/M</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login-anim.css') }}" />
</head>
<body class="login-page">

  <!-- Fundo animado com partículas -->
  <div class="login-bg">
    <div class="particles" id="particles"></div>
    <div class="scan-line"></div>
  </div>

  <!-- Raios de luz ao redor do brasão -->
  <div class="light-rays" id="lightRays"></div>

  <div class="login-wrapper d-flex align-items-center justify-content-center min-vh-100 px-3">
    <div class="login-card w-100">

      <!-- ── Brasão animado ── -->
      <div class="brasao-stage mb-4">

        <!-- Anel externo giratório -->
        <div class="ring ring-outer">
          <div class="ring-tick" style="--i:0"></div>
          <div class="ring-tick" style="--i:1"></div>
          <div class="ring-tick" style="--i:2"></div>
          <div class="ring-tick" style="--i:3"></div>
          <div class="ring-tick" style="--i:4"></div>
          <div class="ring-tick" style="--i:5"></div>
          <div class="ring-tick" style="--i:6"></div>
          <div class="ring-tick" style="--i:7"></div>
        </div>

        <!-- Anel médio (contra-rotação) -->
        <div class="ring ring-mid"></div>

        <!-- Anel interno pulsante -->
        <div class="ring ring-inner"></div>

        <!-- Glow base -->
        <div class="brasao-glow"></div>

        <!-- Container do brasão com float -->
        <div class="brasao-float-wrap">
          <div class="brasao-shield">
            <img
              src="{{ url_for('static', filename='img/brasao.png') }}"
              alt="21º BPM/M"
              class="brasao-img"
              id="brasaoImg"
              onerror="this.style.display='none'; document.getElementById('brasaoFallback').style.display='flex';"
            />
            <!-- Fallback se imagem não carregada -->
            <div class="brasao-fallback" id="brasaoFallback">
              <i class="bi bi-shield-fill-check"></i>
            </div>
          </div>
        </div>

        <!-- Faísca / reflexo -->
        <div class="spark spark-1"></div>
        <div class="spark spark-2"></div>
        <div class="spark spark-3"></div>

      </div>

      <!-- ── Títulos ── -->
      <div class="text-center mb-4">
        <h1 class="login-title">21º BPM/M</h1>
        <p class="login-subtitle">POLÍCIA MILITAR DO ESTADO DE SÃO PAULO</p>
        <div class="login-divider mx-auto my-2"></div>
        <p class="login-system-name">Sistema Operacional</p>
      </div>

      <!-- ── Formulário ── -->
      <form method="POST" action="{{ url_for('login') }}" novalidate autocomplete="off">

        {% if erro %}
        <div class="alert pmesp-alert alert-danger mb-3 py-2" role="alert">
          <i class="bi bi-exclamation-octagon me-2"></i>{{ erro }}
        </div>
        {% endif %}

        <div class="mb-3">
          <label for="username" class="login-label">
            <i class="bi bi-person-badge me-1"></i>Usuário
          </label>
          <div class="input-group pmesp-input-group">
            <span class="input-group-text pmesp-input-icon">
              <i class="bi bi-person-fill"></i>
            </span>
            <input
              type="text"
              id="username"
              name="username"
              class="form-control pmesp-input"
              placeholder="Digite seu usuário"
              autocomplete="username"
              autofocus
              required
            />
          </div>
        </div>

        <div class="mb-4">
          <label for="senha" class="login-label">
            <i class="bi bi-lock me-1"></i>Senha
          </label>
          <div class="input-group pmesp-input-group">
            <span class="input-group-text pmesp-input-icon">
              <i class="bi bi-key-fill"></i>
            </span>
            <input
              type="password"
              id="senha"
              name="senha"
              class="form-control pmesp-input"
              placeholder="Digite sua senha"
              autocomplete="current-password"
              required
            />
            <button type="button" class="btn pmesp-input-icon" id="toggleSenha" tabindex="-1">
              <i class="bi bi-eye-fill" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-login w-100 py-3 fw-bold">
          <span class="btn-login-inner">
            <i class="bi bi-shield-lock-fill me-2"></i>ENTRAR NO SISTEMA
          </span>
          <span class="btn-login-shimmer"></span>
        </button>

      </form>

      <!-- ── Rodapé ── -->
      <div class="login-footer text-center mt-4">
        <div class="d-flex align-items-center justify-content-center gap-2 mb-1">
          <span class="dot-verde"></span>
          <small class="text-muted opacity-50">v1.0 &nbsp;|&nbsp; PMESP — 21º BPM/M &copy; 2024</small>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    /* ── Toggle senha ── */
    document.getElementById('toggleSenha').addEventListener('click', function () {
      const input = document.getElementById('senha');
      const icon  = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash-fill';
      } else {
        input.type = 'password';
        icon.className = 'bi bi-eye-fill';
      }
    });

    /* ── Partículas de fundo ── */
    (function () {
      const container = document.getElementById('particles');
      const N = 40;
      for (let i = 0; i < N; i++) {
        const p = document.createElement('span');
        p.className = 'particle';
        p.style.cssText = `
          left: ${Math.random() * 100}%;
          top:  ${Math.random() * 100}%;
          width:  ${Math.random() * 3 + 1}px;
          height: ${Math.random() * 3 + 1}px;
          animation-delay:    ${Math.random() * 8}s;
          animation-duration: ${Math.random() * 10 + 6}s;
          opacity: ${Math.random() * 0.5 + 0.1};
        `;
        container.appendChild(p);
      }
    })();

    /* ── Raios de luz ── */
    (function () {
      const rays = document.getElementById('lightRays');
      for (let i = 0; i < 8; i++) {
        const r = document.createElement('div');
        r.className = 'ray';
        r.style.cssText = `--angle: ${i * 45}deg; animation-delay: ${i * 0.4}s;`;
        rays.appendChild(r);
      }
    })();

    /* ── Interação touch no brasão ── */
    const brasao = document.querySelector('.brasao-float-wrap');
    brasao.addEventListener('click', function () {
      this.classList.add('brasao-tap');
      setTimeout(() => this.classList.remove('brasao-tap'), 600);
    });
  </script>
</body>
</html>
